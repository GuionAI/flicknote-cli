config_version = "0"

exclude_patterns = ["target/**", "vendor/**", "docs/**", "dagger/**"]

test_patterns = ["**/*_test.go", "**/*_test.rs"]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

[[plugin]]
name = "clippy"
mode = "block"

# Pinned to 2.10.1 — qlty default was not resolving a compatible version.
[[plugin]]
name = "golangci-lint"
version = "2.10.1"
mode = "block"

[[plugin]]
name = "trufflehog"
mode = "block"

[[plugin]]
name = "osv-scanner"
mode = "block"
