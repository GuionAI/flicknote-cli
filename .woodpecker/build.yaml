when:
  - event: push
    branch: main

steps:
  - name: build-and-publish
    image: ghcr.io/tta-lab/moon-ci:latest
    environment:
      _EXPERIMENTAL_DAGGER_RUNNER_HOST: tcp://dagger-engine-0.dagger-headless.devops.svc:8080
    commands:
      - |
        set -e
        DAGGER_VERSION=0.19.11
        moon setup
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        curl -fsSL "https://github.com/dagger/dagger/releases/download/v${DAGGER_VERSION}/dagger_v${DAGGER_VERSION}_linux_$ARCH.tar.gz" | tar -xz -C /usr/local/bin/ dagger
        export REGISTRY=registry-docker-registry.devops.svc:5000
        export IMAGE_TAGS="sha-${CI_COMMIT_SHA:0:7},latest"
        moon run flicknote-cli:push
        touch .build-success

  - name: notify
    image: curlimages/curl
    environment:
      TELEGRAM_TOKEN:
        from_secret: telegram_token
      TELEGRAM_TO:
        from_secret: telegram_to
    commands:
      - |
        SHORT_SHA=${CI_COMMIT_SHA:0:7}
        if [ -f .build-success ]; then
          MESSAGE="✅ <b>flicknote-cli built</b>
        Tag: <code>sha-${SHORT_SHA}</code>
        <a href=\"${CI_PIPELINE_FORGE_URL}\">View Run</a>"
        else
          MESSAGE="❌ <b>flicknote-cli build failed</b>
        <a href=\"${CI_PIPELINE_FORGE_URL}\">View Run</a>"
        fi
        curl --fail -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_TO}" -d parse_mode="HTML" -d text="${MESSAGE}"
    when:
      - status: [success, failure]
