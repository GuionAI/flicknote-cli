when:
  - event: push
    branch: main

steps:
  - name: build-and-publish
    image: ghcr.io/tta-lab/moon-ci:latest
    environment:
      _EXPERIMENTAL_DAGGER_RUNNER_HOST: tcp://dagger-engine-0.dagger-headless.devops.svc:8080
    commands:
      - |
        set -e
        moon setup
        export PATH="/root/.moon/bin:/root/.proto/bin:$PATH"
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        curl -fsSL "https://github.com/dagger/dagger/releases/download/v0.19.11/dagger_v0.19.11_linux_$ARCH.tar.gz" | tar -xz -C /usr/local/bin/ dagger
        export REGISTRY=registry-docker-registry.devops.svc:5000
        export IMAGE_TAGS="sha-${CI_COMMIT_SHA:0:7},latest"
        moon run flicknote-cli:push
        touch .build-success

  - name: notify
    image: curlimages/curl
    environment:
      TELEGRAM_TOKEN:
        from_secret: telegram_token
      TELEGRAM_TO:
        from_secret: telegram_to
    commands:
      - |
        if [ -f .build-success ]; then EMOJI="✅"; STATUS="success"; else EMOJI="❌"; STATUS="failure"; fi
        MESSAGE=$$(printf '%s <b>flicknote-cli %s</b>\n<b>Tag:</b> <code>sha-${CI_COMMIT_SHA:0:7}</code>\n<a href="${CI_PIPELINE_FORGE_URL}">View Run</a>' "$${EMOJI}" "$${STATUS}")
        curl --fail -s -X POST "https://api.telegram.org/bot$${TELEGRAM_TOKEN}/sendMessage" -d chat_id="$${TELEGRAM_TO}" -d parse_mode="HTML" -d text="$${MESSAGE}"
    when:
      - status: [success, failure]
