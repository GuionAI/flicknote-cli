[graph]
targets = []
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
exceptions = []
# Workspace crates are private/unlicensed
[[licenses.clarify]]
crate = "flicknote-cli"
expression = "MIT"
license-files = []
[[licenses.clarify]]
crate = "flicknote-core"
expression = "MIT"
license-files = []
[[licenses.clarify]]
crate = "flicknote-auth"
expression = "MIT"
license-files = []
[[licenses.clarify]]
crate = "flicknote-sync"
expression = "MIT"
license-files = []
[[licenses.clarify]]
crate = "flicktask-cli"
expression = "MIT"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
# Transitive deps from powersync/http-client have unmaintained advisories
# we can't control — ignore until upstream updates
ignore = [
    "RUSTSEC-2021-0060", # aes-soft — merged into aes
    "RUSTSEC-2021-0059", # aesni — merged into aes
    "RUSTSEC-2025-0052", # async-std — discontinued
    "RUSTSEC-2021-0064", # cpuid-bool — renamed to cpufeatures
    "RUSTSEC-2025-0134", # rustls-pemfile — unmaintained
    "RUSTSEC-2024-0384", # instant — unmaintained
    "RUSTSEC-2024-0436", # paste — no longer maintained
    "RUSTSEC-2020-0056", # stdweb — unmaintained
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/powersync-ja/powersync-native",
    "https://github.com/tta-lab/taskchampion",
]
