[graph]
targets = []
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
]
exceptions = []
# Workspace crates are private/unlicensed
[[licenses.clarify]]
crate = "flicknote-cli"
expression = "MIT"
license-files = []
[[licenses.clarify]]
crate = "flicknote-core"
expression = "MIT"
license-files = []
[[licenses.clarify]]
crate = "flicknote-auth"
expression = "MIT"
license-files = []
[[licenses.clarify]]
crate = "flicknote-sync"
expression = "MIT"
license-files = []
[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
# All previous ignores were stale — crates no longer in the dep graph after upgrades.
# Re-add with justification if any appear again.
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/powersync-ja/powersync-native",
]
