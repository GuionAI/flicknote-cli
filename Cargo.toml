[workspace]
members = [
    "flicknote-core",
    "flicknote-auth",
    "flicknote-cli",
    "flicknote-sync",
]
resolver = "3"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "time"] }
powersync = { path = "/Users/neil/Code/guion-opensource/powersync-repos/powersync-native/powersync", features = ["tokio"] }
rusqlite = { version = "0.37", features = ["load_extension", "bundled"] }
http-client = { version = "6.5.3", default-features = false }
async-trait = "0.1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
futures-lite = "2"
