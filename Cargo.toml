[workspace]
members = [
    "flicknote-core",
    "flicknote-auth",
    "flicknote-cli",
    "flicknote-sync",
    "flicktask-cli",
]
resolver = "3"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "time"] }
powersync = { path = "vendor/powersync", features = ["tokio"] }
rusqlite = { version = "0.38", features = ["load_extension", "bundled", "fallible_uint"] }
http-client = { version = "6.5.3", default-features = false }
async-trait = "0.1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
futures-lite = "2"
postgres = { version = "0.19", features = ["with-chrono-0_4"] }
anyhow = "1"
toml = "0.8"
dirs = "6"
taskchampion = { git = "https://github.com/tta-lab/taskchampion", tag = "v3.0.2-pre-flicktask-4", default-features = false, features = ["storage-powersync"] }

[workspace.lints.rust]
unsafe_code = "warn"
unreachable_pub = "warn"

[workspace.lints.clippy]
# Error swallowing prevention
let_underscore_must_use = "warn"
let_underscore_untyped = "warn"

# Prevent debug artifacts in production
dbg_macro = "warn"
print_stdout = "warn"
print_stderr = "warn"

# Useful pedantic subset (low noise, high value)
needless_pass_by_value = "warn"
redundant_closure_for_method_calls = "warn"
use_self = "warn"
