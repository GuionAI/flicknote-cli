name: PR

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  check:
    name: Check
    runs-on: rust-ci
    steps:
      - uses: actions/checkout@v4

      - uses: https://github.com/Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: License & vulnerability check
        run: cargo deny check

      - name: Test
        run: cargo test
