name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -p flicknote-auth -p flicknote-cli -p flicknote-core -p flicknote-sync --check

      - name: Lint with clippy
        run: cargo clippy -p flicknote-auth -p flicknote-cli -p flicknote-core -p flicknote-sync --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check for security vulnerabilities
        run: cargo deny check

      - name: Build
        run: cargo build

  check-tui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flicknote-tui/go.mod
          cache: true

      - name: Lint TUI
        run: |
          cd flicknote-tui
          go vet ./...
          go build -o /dev/null .

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install qlty
        run: |
          curl -fsSL https://qlty.sh | QLTY_VERSION=0.618.0 bash
          echo "$HOME/.qlty/bin" >> $GITHUB_PATH

      - name: Scan with qlty
        run: qlty check --all --no-progress
