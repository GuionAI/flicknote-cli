name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flicknote-tui/go.mod
          cache: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format code
        run: cargo fmt -p flicknote-auth -p flicknote-cli -p flicknote-core -p flicknote-sync

      - name: Lint with clippy
        run: cargo clippy -p flicknote-auth -p flicknote-cli -p flicknote-core -p flicknote-sync --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check for security vulnerabilities
        run: cargo deny check

      - name: Build
        run: cargo build

      - name: Lint TUI
        run: |
          cd flicknote-tui
          go vet ./...
          go build -o /dev/null .

      - name: Lint TUI with golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: flicknote-tui
          version: latest

  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
