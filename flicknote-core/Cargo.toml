[package]
name = "flicknote-core"
version = "0.1.0"
edition = "2024"

[features]
default = ["powersync"]
powersync = ["dep:powersync", "dep:rusqlite"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
powersync = { workspace = true, optional = true }
rusqlite = { workspace = true, optional = true }
http-client = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
flicknote-auth = { path = "../flicknote-auth" }
dirs = { workspace = true }
postgres = { workspace = true }
chrono = "0.4"
uuid = { workspace = true }

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
